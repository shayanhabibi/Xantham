# ═══════════════════════════════════════════════════════════════════════════════════════════
# cloudflare.pilot.toml — DRAFT v0 (2026-07-02) — FOR OWNER MARKUP
#
# The policy overlay for the Fidelity.CloudEdge binding constellation (docs/LANDSCAPE.md, docs/GOALS.md).
# This file declares ONLY decisions the source cannot make: entries, dependency boundary
# policies, ambient-package area partitions, packaging. Everything else defaults from the
# ecosystem's own declarations (package.json exports maps, module paths, lockfile).
# Drafted from the 2026-07-02 six-agent constellation survey (installed packages + npm registry).
# Every `# DECISION:` line is an owner call — mark up freely; nothing here is executed yet.
# ═══════════════════════════════════════════════════════════════════════════════════════════

[recipe]
name = "Fidelity.CloudEdge"
format = "v0"
shape = "one-to-one"            # one npm package -> one F# library; many-to-many is the eventual form
generated-from-survey = "2026-07-02"

# ─────────────────────────────────────────────────────────────────────────────────────────────
# ENTRIES — the v0 bound set, in publish (dependency) order.
# kind = "module" (crawled via exports map) | "ambient-root" (added as compilation root).
# ─────────────────────────────────────────────────────────────────────────────────────────────

[[entry]]
package = "@cloudflare/workers-types"
version = "4.20260630.1"
kind = "ambient-root"
lib = "Fidelity.CloudEdge.Workers"
# CRITICAL (survey find): package.json has NO types/main/exports; default resolution lands on
# root index.d.ts which is byte-identical to oldest/ — the pre-2021-11-03 surface. Never crawl root.
root = "latest/index.ts"
# DECISION: crawl the MODULE TWIN (latest/index.ts, ~959 exports) rather than the ambient
# latest/index.d.ts — every snapshot dir ships both; the twin makes the encoder uniform (no
# ambient special-casing) and the surface is identical. Alternative: latest/index.d.ts as true
# ambient root. Either way the compat pin is "latest" -> record the resolved date in the drift report.
depends-on = []

[[entry]]
package = "zod"
version = "4.4.3"
kind = "module"
lib = "Fidelity.CloudEdge.Zod"
policy = "opaque-handle"
# NOT a full zod binding (437 exports of type-program machinery). Survey verdict: zod sits in
# CONSTRUCTION position (McpServer.registerTool inputSchema) — pure erasure kills server-side tool
# authoring, so v0 = opaque ZodType/$ZodType handle (v3/v4 arms collapse onto one handle) plus a
# hand-curated builder set. Consumers PRODUCE schemas through these; they never traverse internals.
builders = ["object", "string", "number", "boolean", "literal", "enum", "array", "optional", "union", "discriminatedUnion"]
depends-on = []

[[entry]]
package = "partysocket"
version = "1.3.0"
kind = "module"
lib = "Fidelity.CloudEdge.PartySocket"
entries = [".", "./ws"]
# Client-side (browser/Fable) lib; AgentClient extends PartySocket so it precedes agents.
# Excluded: ./react (React layer deferred), ./use-ws (duplicates ./ws + ambient WebSocketEventMap
# gotcha), ./event-target-polyfill (side-effect-only `export {}`).
depends-on = []

[[entry]]
package = "partyserver"
version = "0.5.8"
kind = "module"
lib = "Fidelity.CloudEdge.PartyServer"
entries = ["."]
# Hard prerequisite of agents: Agent extends Server; Connection/ConnectionContext/WSMessage are
# re-exported through agents' public surface. Tiny: single 392-line d.ts, 12 exports, bind fully.
depends-on = ["Fidelity.CloudEdge.Workers"]

[[entry]]
package = "@modelcontextprotocol/sdk"
version = "1.29.0"                 # agents pins EXACTLY 1.29.0 (codemode peers ^1.25.0) — pin to agents' pin
kind = "module"
lib = "Fidelity.CloudEdge.Mcp"
policy = "bind-touchpoints"
# Not Cloudflare-authored but a hard prerequisite: agents' ./mcp classes literally extend/implement
# SDK classes (WorkerTransport extends WebStandardStreamableHTTPServerTransport, McpAgent.server:
# McpServer, ...) so erasure would gut those entries. Survey-verified touchpoint closure ~50-60 types:
# types.js data records (Tool/Prompt/Resource/JSONRPCMessage/Elicit*/CallTool*/...), Client, Server,
# McpServer, 3 web-standard transports + options, shared/{protocol,transport,auth}, OAuth* records,
# AuthInfo, EventStore/EventId/StreamId.
# Omitted (survey-confirmed unreachable from agents' entries): express/node-http transports,
# validation/ajv + validation/cfworker, experimental/tasks, cli.
depends-on = ["Fidelity.CloudEdge.Zod"]

[[entry]]
package = "@cloudflare/codemode"
version = "0.4.2"
kind = "module"
lib = "Fidelity.CloudEdge.CodeMode"
entries = [".", "./mcp", "./browser"]
# agents subclasses it (BrowserConnector extends CodemodeConnector). Deferred: ./ai, ./tanstack-ai
# (require Vercel `ai` / @tanstack/ai peers — out of scope). Skipped: ./vite (tooling).
depends-on = ["Fidelity.CloudEdge.Workers", "Fidelity.CloudEdge.Mcp", "Fidelity.CloudEdge.Zod"]

[[entry]]
package = "agents"
version = "0.17.1"                 # npm latest is 0.17.3 — two releases during the survey window; first drift-report candidate
kind = "module"
lib = "Fidelity.CloudEdge.Agents"
entries = [".", "./types", "./client", "./mcp", "./mcp/client", "./mcp/do-oauth-client-provider", "./schedule", "./workflows", "./email", "./observability", "./browser"]
# The v0 goal lives in ".": Agent<Env,State,Props> subclass + routeAgentRequest + getAgentByName +
# state/setState/onStateChanged + this.sql tagged template + schedule — that IS "enough to build something".
# ENCODER NOTE (survey find): every entry .d.ts is a one-line shim over mangled shared chunks
# (agent-tool-types-CNyE1iz_.d.ts serves ".", "./mcp" AND "./mcp/client") — multi-entry dedup must
# key on chunk file identity, not entry, and chunk names change every release (naming must not leak them).
depends-on = ["Fidelity.CloudEdge.Workers", "Fidelity.CloudEdge.PartyServer", "Fidelity.CloudEdge.PartySocket", "Fidelity.CloudEdge.CodeMode", "Fidelity.CloudEdge.Mcp", "Fidelity.CloudEdge.Zod"]

# agents entries EXCLUDED from v0, by reason:
#   tombstones (d.ts is literally `export {}`, .js throws): ./codemode/ai, ./ai-chat-agent,
#     ./ai-chat-v5-migration, ./ai-react, ./ai-types — generator must SKIP or it emits empty modules
#   React layer (react>=19 peer + Fable.React/Feliz decision; wire protocol reachable via ./client):
#     ./react, ./chat/react
#   Vercel-ai/tanstack/chat peers out of scope: ./chat (161 exports!), ./chat-sdk, ./agent-tools,
#     ./skills, ./skills/compile, ./experimental/*, ./browser/ai, ./browser/tanstack-ai
#   payment-protocol peers (@x402/*): ./x402
#   tooling: ./tsconfig, ./vite

# ─────────────────────────────────────────────────────────────────────────────────────────────
# DEPENDENCY POLICIES — packages REACHED but not bound as libraries.
# ─────────────────────────────────────────────────────────────────────────────────────────────

[dependencies."json-schema-typed"]
policy = "erase-with-advisory"
# Single touchpoint (JSONSchema.Interface) at the optional jsonSchemaValidator plug-in position;
# degrading to obj loses nothing structural. Promote to own lib only if consumers need typed validators.

[dependencies.eventsource]
policy = "erase-with-advisory"
# ~5 small types, all on the DEPRECATED SSE transport's optional config; StreamableHTTP (the
# recommended path) has zero eventsource dependency.

[dependencies.hono]
policy = "out-of-scope"
# Transitive via mcp-sdk only; not in any bound public signature. (If ever bound: inference-heavy
# typed-route surface — idiomatic wrapper, not mechanical binding.)

# Runtime-only deps of agents, survey-confirmed ZERO public type-surface exposure — nothing to bind:
[dependencies.cron-schedule]
policy = "no-surface"
[dependencies.mimetext]
policy = "no-surface"
[dependencies."@cfworker/json-schema"]
policy = "no-surface"

# Out-of-scope peer ecosystems (any entry requiring them is deferred, listed above):
[dependencies.ai]
policy = "out-of-scope"            # Vercel AI SDK — revisit only with a deliberate decision to bind it
[dependencies.react]
policy = "out-of-scope"            # the React layer is a later, separate integration decision

# ─────────────────────────────────────────────────────────────────────────────────────────────
# AREAS — partition table for the AMBIENT package only (module packages partition by their own
# source paths). workers-types latest/: 966 top-level declarations, clustered by survey.
# ─────────────────────────────────────────────────────────────────────────────────────────────

[areas."@cloudflare/workers-types"]

# DECISION: churn isolation. Workers AI is 355 of 966 declarations (37%) and changes on the weekly
# model-catalog cadence; isolating it keeps R2Bucket/DurableObject consumers from churning every release.
[areas."@cloudflare/workers-types".Ai]
match = ["Ai*", "Ai_Cf_*", "Base_Ai_Cf_*", "ChatCompletion*", "Responses*", "Response*Event*", "AiModels*"]
submodule = "Fidelity.CloudEdge.Workers.Ai"

[areas."@cloudflare/workers-types".AiSearch]
match = ["AiSearch*", "AutoRAG*", "ComparisonFilter*"]

[areas."@cloudflare/workers-types".Storage]
match = ["KV*", "R2*", "D1*"]

[areas."@cloudflare/workers-types".DurableObjects]
match = ["DurableObject*", "SqlStorage*", "AlarmInvocationInfo", "ColoLocalActorNamespace"]

[areas."@cloudflare/workers-types".Queues]
match = ["Queue*", "Message*"]

[areas."@cloudflare/workers-types".Vectorize]
match = ["Vectorize*", "Vector*"]

[areas."@cloudflare/workers-types".Workflows]
match = ["Workflow*"]              # plus the cloudflare:workers + cloudflare:workflows module islands

[areas."@cloudflare/workers-types".StreamVideo]
match = ["Stream*"]
# COLLISION HAZARD (survey): ships generically-named InternalError/BadRequestError/NotFoundError/
# ForbiddenError/RateLimitedError/... all extending StreamError — family-prefix on collision.

[areas."@cloudflare/workers-types".BrowserRun]
match = ["BrowserRun*"]

[areas."@cloudflare/workers-types".Images]
match = ["Images*", "HostedImages*", "Image*"]

[areas."@cloudflare/workers-types".RequestCf]
match = ["IncomingRequestCfProperties*", "RequestInitCfProperties*", "CfProperties", "BasicImageTransformations*", "Iso3166*", "ContinentCode"]

[areas."@cloudflare/workers-types".TailTrace]
match = ["Tail*", "Trace*", "ScriptVersion", "UnsafeTraceMetrics"]

[areas."@cloudflare/workers-types".Handlers]
match = ["ExportedHandler*", "ExecutionContext", "ScheduledEvent*", "ScheduledController", "EmailMessage*", "FetchEvent"]

[areas."@cloudflare/workers-types".ModuleIslands]
# The 7 `declare module` islands: cloudflare:workers (32 exports: WorkerEntrypoint, DurableObject,
# RpcTarget, RpcStub, Workflow*...), cloudflare:sockets, cloudflare:email, cloudflare:workflows,
# cloudflare:pipelines, cloudflare:node, assets:*. Module-style inside the ambient file — F#
# consumers import these rather than rely on globals; render as their own modules.
match = ["module:cloudflare:*", "module:assets:*"]

[areas."@cloudflare/workers-types".WebStandard]
match = ["Request", "Response", "Headers", "fetch", "Body*", "Blob", "File", "FormData", "URL*", "ReadableStream*", "WritableStream*", "TransformStream*", "*QueuingStrategy", "Event", "EventTarget", "Abort*", "WebSocket*", "Cache*", "Crypto*", "SubtleCrypto", "CryptoKey", "JsonWebKey", "TextEncoder*", "TextDecoder*", "setTimeout", "setInterval", "structuredClone", "DOMException", "*GlobalScope", "console", "navigator", "performance", "btoa", "atob", "queueMicrotask", "reportError"]
# DECISION (the big representation call, ~150 of 966 decls): bind these web-standard twins INSIDE
# Fidelity.CloudEdge.Workers (self-contained, matches workerd's actual divergent surface, no
# Fable.Browser/Fetch dependency) vs map to Fable's existing web types (interop with existing Fable
# code, but workers' Request/WebSocket genuinely differ from browsers').
# v0 default: BIND-AS-TWINS in a Workers.Http submodule; revisit at L2 with an advisory.

[areas."@cloudflare/workers-types".Remainder]
match = ["*"]                      # everything unmatched lands here and is REPORTED, never silently dropped

# ─────────────────────────────────────────────────────────────────────────────────────────────
# PACKAGING — 1:1, versions track upstream.
# ─────────────────────────────────────────────────────────────────────────────────────────────

[packaging]
version-scheme = "upstream-tracking"   # each nupkg carries the npm version (+compat date for Workers) it was generated from
publish-order = ["Fidelity.CloudEdge.Workers", "Fidelity.CloudEdge.Zod", "Fidelity.CloudEdge.PartySocket", "Fidelity.CloudEdge.PartyServer", "Fidelity.CloudEdge.Mcp", "Fidelity.CloudEdge.CodeMode", "Fidelity.CloudEdge.Agents"]
changed-only = true                    # update runs republish only packages whose surface diffed

